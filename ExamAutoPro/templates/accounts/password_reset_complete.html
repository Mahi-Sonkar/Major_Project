{% extends 'base.html' %}

{% block title %}Password Reset Complete - ExamAutoPro{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow border-0 text-center" style="border-radius: 15px;">
            <div class="card-body p-5">
                <i class="fas fa-check-circle fa-4x text-success mb-4"></i>
                <h3 class="fw-bold mb-3">Password Updated!</h3>
                <p class="text-muted mb-4">
                    Your password has been successfully reset. You can now log in with your new password.
                </p>
                <div class="d-grid">
                    <a href="{% url 'login' %}" class="btn btn-primary fw-bold">Login Now</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
